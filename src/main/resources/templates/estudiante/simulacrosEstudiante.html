<!doctype html>

<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Simulacros</title>
    <link rel="icon" th:href="@{/assets/gestion-icon.png}" type="image/png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/estilos/pEstudiante.css}" />
  </head>

  <body>
    <div th:replace="~{fragments/navbarEstudiante :: navbar}"></div>

    <div class="container mt-4">

      <!-- ENCABEZADO -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h3 class="fw-bold text-primary mb-0" th:text="#{simulacros.student.title}">Mis Simulacros</h3>
          <p class="text-muted mb-0"
             th:text="'Resultados cargados para ' + ${estudiante.primerNombre} + ' ' + ${estudiante.primerApellido}">
          </p>
        </div>
        <a th:href="@{/estudiante/pEstudiante}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i><span th:text="#{btn.back}">Volver</span>
        </a>
      </div>

      <!-- SIN RESULTADOS -->
      <div th:if="${resultados == null or resultados.isEmpty()}"
           class="empty-state text-center py-5">
        <i class="bi bi-folder2-open display-1 text-muted"></i>
        <h5 class="mt-3 text-muted" th:text="#{simulacros.student.empty.title}">No hay simulacros cargados</h5>
        <p class="text-muted" th:text="#{simulacros.student.empty.msg}">El administrador aún no ha subido resultados para ti.</p>
      </div>

      <!-- LISTA DE RESULTADOS -->
      <div th:if="${resultados != null and !resultados.isEmpty()}" class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="resultado : ${resultados}">
          <div class="simulacro-card">
            <div class="simulacro-icon">
              <i class="bi bi-file-earmark-pdf-fill text-danger fs-1"></i>
            </div>
            <div class="simulacro-info">
              <h6 class="fw-bold mb-1"
                  th:text="${resultado.simulacro.titulo}">Simulacro</h6>
              <p class="text-muted small mb-1"
                 th:text="${resultado.simulacro.descripcion}"></p>
              <span class="badge bg-primary-subtle text-primary"
                    th:text="${resultado.simulacro.fechaAplicacion}"></span>
            </div>
            <a th:href="@{/estudiante/descargarResultado/{id}(id=${resultado.id})}"
               class="btn btn-main text-white w-100 mt-3">
              <i class="bi bi-download me-2"></i><span th:text="#{simulacros.student.download}">Descargar PDF</span>
            </a>
          </div>
        </div>
      </div>

    </div>
  </body>
</html>
