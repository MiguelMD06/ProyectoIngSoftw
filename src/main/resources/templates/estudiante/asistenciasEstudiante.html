<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Asistencia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" th:href="@{/estilos/pEstudiante.css}" />
  </head>

  <body>
    <div th:replace="~{fragments/navbarEstudiante :: navbar}"></div>

    <div class="container mt-4">

      <!-- ENCABEZADO -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h3 class="fw-bold text-primary mb-0">Mi Asistencia</h3>
          <p class="text-muted mb-0"
             th:text="'Registro de asistencia de ' + ${estudiante.primerNombre} + ' ' + ${estudiante.primerApellido}">
          </p>
        </div>
        <a th:href="@{/estudiante/pEstudiante}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
      </div>

      <!-- RESUMEN -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="info-card">
            <div class="info-icon" style="background:#d1fae5;">
              <i class="bi bi-check-circle-fill text-success fs-4"></i>
            </div>
            <div class="info-body">
              <span class="info-label">Asistencias</span>
              <span class="info-value fw-bold text-success" th:text="${totalPresente}">0</span>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-card">
            <div class="info-icon" style="background:#fee2e2;">
              <i class="bi bi-x-circle-fill text-danger fs-4"></i>
            </div>
            <div class="info-body">
              <span class="info-label">Faltas</span>
              <span class="info-value fw-bold text-danger" th:text="${totalAusente}">0</span>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-card">
            <div class="info-icon" style="background:#fef3c7;">
              <i class="bi bi-clock-fill text-warning fs-4"></i>
            </div>
            <div class="info-body">
              <span class="info-label">Llegadas tarde</span>
              <span class="info-value fw-bold text-warning" th:text="${totalTarde}">0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- SIN REGISTROS -->
      <div th:if="${asistencias == null or asistencias.isEmpty()}"
           class="empty-state text-center py-5">
        <i class="bi bi-calendar2-x display-1 text-muted"></i>
        <h5 class="mt-3 text-muted">Sin registros de asistencia</h5>
        <p class="text-muted">El administrador aún no ha registrado tu asistencia.</p>
      </div>

      <!-- TABLA DE ASISTENCIAS -->
      <div th:if="${asistencias != null and !asistencias.isEmpty()}"
           class="quick-card">
        <h6 class="fw-semibold mb-3">Historial de asistencia</h6>
        <table class="table table-borderless align-middle">
          <thead class="table-light">
            <tr>
              <th>Fecha</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="a : ${asistencias}">
              <td th:text="${a.fecha}"></td>
              <td>
                <!-- PRESENTE -->
                <span th:if="${a.estado.name() == 'PRESENTE'}"
                      class="badge rounded-pill"
                      style="background:#d1fae5; color:#065f46;">
                  <i class="bi bi-check-circle-fill me-1"></i>Presente
                </span>
                <!-- AUSENTE -->
                <span th:if="${a.estado.name() == 'AUSENTE'}"
                      class="badge rounded-pill"
                      style="background:#fee2e2; color:#991b1b;">
                  <i class="bi bi-x-circle-fill me-1"></i>Falta
                </span>
                <!-- TARDE -->
                <span th:if="${a.estado.name() == 'TARDE'}"
                      class="badge rounded-pill"
                      style="background:#fef3c7; color:#92400e;">
                  <i class="bi bi-clock-fill me-1"></i>Tarde
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </body>
</html>
