<!doctype html>

<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Estudiante</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/estilos/pEstudiante.css}" />
  </head>

  <body>
    <div th:replace="~{fragments/navbarEstudiante :: navbar}"></div>

    <!-- HERO -->
    <div class="hero-section">
      <div class="container">
        <div class="d-flex align-items-center gap-3 mb-2">
          <div class="avatar-circle">
            <i class="bi bi-person-fill fs-3 text-white"></i>
          </div>
          <div>
            <h2 class="mb-0 fw-bold"
                th:text="${estudiante.primerNombre + ' ' + estudiante.primerApellido}">
              Estudiante
            </h2>
            <span class="text-blue-light">Estudiante activo</span>
          </div>
        </div>
      </div>
    </div>

    <!-- INFO CARDS -->
    <div class="container mt-4">
      <div class="row g-4">

        <!-- INSTITUCIÓN -->
        <div class="col-md-4">
          <div class="info-card">
            <div class="info-icon bg-primary-light">
              <i class="bi bi-building text-primary fs-4"></i>
            </div>
            <div class="info-body">
              <span class="info-label">Institución</span>
              <span class="info-value" th:text="${institucionNombre}">—</span>
            </div>
          </div>
        </div>

        <!-- SALÓN -->
        <div class="col-md-4">
          <div class="info-card">
            <div class="info-icon bg-success-light">
              <i class="bi bi-door-open text-success fs-4"></i>
            </div>
            <div class="info-body">
              <span class="info-label">Salón</span>
              <span class="info-value" th:text="${salon}">—</span>
            </div>
          </div>
        </div>

        <!-- ADMIN -->
        <div class="col-md-4">
          <div class="info-card">
            <div class="info-icon bg-warning-light">
              <i class="bi bi-person-badge text-warning fs-4"></i>
            </div>
            <div class="info-body">
              <span class="info-label">Administrador</span>
              <span class="info-value" th:text="${adminNombre}">—</span>
            </div>
          </div>
        </div>

      </div>

      <!-- PROGRESO DEL CURSO -->
      <div class="row g-4 mt-2">
        <div class="col-12">
          <div class="info-card flex-column align-items-start gap-2">
            <div class="d-flex justify-content-between w-100 align-items-center">
              <span class="info-label">Progreso del curso</span>
              <span class="info-value" th:text="${progresoCurso} + '%'">0%</span>
            </div>
            <div class="progress w-100" style="height: 12px; border-radius: 8px;">
              <div class="progress-bar bg-primary"
                   role="progressbar"
                   th:style="'width: ' + ${progresoCurso} + '%'"
                   th:attr="aria-valuenow=${progresoCurso}"
                   aria-valuemin="0" aria-valuemax="100">
              </div>
            </div>
            <small class="text-muted"
                   th:text="${diasRestantes == 0 ? 'Curso finalizado' : diasRestantes + ' días restantes para finalizar el curso'}">
            </small>
          </div>
        </div>
      </div>

      <!-- ACCESOS RÁPIDOS -->
      <div class="row g-4 mt-2 mb-4">
        <div class="col-md-6">
          <div class="quick-card d-flex align-items-center gap-3">
            <div class="info-icon bg-primary-light">
              <i class="bi bi-file-earmark-text text-primary fs-4"></i>
            </div>
            <div class="flex-grow-1">
              <span class="info-label">Simulacros</span>
              <p class="mb-0 info-value">Ver mis resultados</p>
            </div>
            <a th:href="@{/estudiante/simulacrosEstudiante}" class="btn btn-main text-white">
              Ver
            </a>
          </div>
        </div>
        <div class="col-md-6">
          <div class="quick-card d-flex align-items-center gap-3">
            <div class="info-icon bg-success-light">
              <i class="bi bi-calendar-check text-success fs-4"></i>
            </div>
            <div class="flex-grow-1">
              <span class="info-label">Asistencia</span>
              <p class="mb-0 info-value">Ver mi registro</p>
            </div>
            <a th:href="@{/estudiante/asistenciasEstudiante}" class="btn btn-main text-white">
              Ver
            </a>
          </div>
        </div>
      </div>

    </div>
  </body>
</html>
