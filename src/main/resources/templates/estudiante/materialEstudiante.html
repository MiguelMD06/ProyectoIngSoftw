<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material de Estudio</title>
    <link rel="icon" th:href="@{/assets/gestion-icon.png}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" th:href="@{/estilos/materialEstudiante.css}" />
  </head>

  <body>
    <div th:replace="~{fragments/navbarEstudiante :: navbar}"></div>

    <div class="container mt-4">

      <!-- ENCABEZADO -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h3 class="fw-bold text-primary mb-0">Material de Estudio</h3>
          <p class="text-muted mb-0"
             th:text="'Material semanal para ' + ${estudiante.primerNombre} + ' ' + ${estudiante.primerApellido}">
          </p>
        </div>
        <a th:href="@{/estudiante/pEstudiante}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
      </div>

      <!-- SIN MATERIALES -->
      <div th:if="${materiales == null or materiales.isEmpty()}"
           class="empty-state text-center py-5">
        <i class="bi bi-journal-x display-1 text-muted"></i>
        <h5 class="mt-3 text-muted">No hay material disponible</h5>
        <p class="text-muted">El administrador aún no ha subido material para tu institución.</p>
      </div>

      <!-- LISTA DE MATERIALES -->
      <div th:if="${materiales != null and !materiales.isEmpty()}" class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="mat : ${materiales}">
          <div class="simulacro-card">
            <div class="simulacro-icon">
              <i class="bi bi-book-fill text-primary fs-1"></i>
            </div>
            <div class="simulacro-info">
              <span class="badge bg-primary mb-2">
                Semana <span th:text="${mat.semana}"></span>
              </span>
              <h6 class="fw-bold mb-1" th:text="${mat.titulo}">Título</h6>
              <p class="text-muted small mb-1" th:text="${mat.descripcion}"></p>
              <span class="badge bg-primary-subtle text-primary"
                    th:text="${#temporals.format(mat.fechaSubida, 'dd/MM/yyyy')}"></span>
            </div>
            <a th:href="@{/estudiante/descargarMaterial/{id}(id=${mat.id})}"
               class="btn btn-main text-white w-100 mt-3">
              <i class="bi bi-download me-2"></i>Descargar
            </a>
          </div>
        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
