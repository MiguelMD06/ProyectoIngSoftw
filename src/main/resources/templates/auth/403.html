<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso denegado - Panel PreICFES</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" type="text/css" th:href="@{/estilos/login.css}" />

    <style>
      .error-card {
        width: 400px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        background: #fff;
      }
      .error-header {
        background-color: #c0392b;
        color: #fff;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .error-header .logo {
        background: rgba(255,255,255,0.15);
        padding: 5px 8px;
        border-radius: 5px;
        font-weight: bold;
      }
      .error-body {
        padding: 35px 25px;
        text-align: center;
      }
      .error-icon {
        font-size: 3.5rem;
        color: #c0392b;
        margin-bottom: 16px;
      }
      .error-code {
        font-size: 4rem;
        font-weight: 800;
        color: #2f2f2f;
        line-height: 1;
      }
      .error-body h5 {
        font-weight: 700;
        margin: 8px 0 6px;
        color: #2f2f2f;
      }
      .error-body p {
        font-size: 0.9rem;
        color: gray;
        margin-bottom: 24px;
      }
      .btn-back {
        border-radius: 8px;
        background-color: #2f6fed;
        border: none;
        color: #fff;
        padding: 10px 28px;
        font-size: 0.95rem;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background-color 0.2s;
      }
      .btn-back:hover {
        background-color: #1f5ed6;
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div class="error-card">
      <div class="error-header">
        <div class="logo">PPI</div>
        <small>Panel de Gestión de PreIcfes</small>
      </div>

      <div class="error-body">
        <div class="error-icon">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <div class="error-code">403</div>
        <h5>Acceso denegado</h5>
        <p>No tienes permisos para acceder a esta sección.<br/>Contacta a un administrador si crees que esto es un error.</p>
        <a th:href="@{/login}" class="btn-back">
          <i class="bi bi-arrow-left"></i> Volver al inicio
        </a>
      </div>
    </div>
  </body>
</html>
