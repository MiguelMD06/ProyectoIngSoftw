<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Panel PreICFES</title>
    <link rel="icon" th:href="@{/assets/gestion-icon.png}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" type="text/css" th:href="@{/estilos/login.css}" />
  </head>

  <body>
    <!-- LANGUAGE SWITCHER (login page) -->
    <div style="position:fixed;top:12px;right:16px;display:flex;gap:6px;z-index:999;">
      <a href="?lang=es" class="badge bg-secondary text-decoration-none" title="Español">ES</a>
      <a href="?lang=en" class="badge bg-secondary text-decoration-none" title="English">EN</a>
      <a href="?lang=fr" class="badge bg-secondary text-decoration-none" title="Français">FR</a>
      <a href="?lang=it" class="badge bg-secondary text-decoration-none" title="Italiano">IT</a>
    </div>

    <div class="login-card">
      <div class="login-header">
        <div class="logo">PPI</div>
        <small th:text="#{login.panel}">Panel de Gestión de PreIcfes</small>
      </div>

      <div class="login-body">
        <h5 th:text="#{login.title}">Iniciar sesión</h5>
        <p th:text="#{login.subtitle}">Ingrese sus credenciales para acceder</p>

        <form th:action="@{/login}" method="post">

          <div th:if="${param.error}"
               class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3"
               role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="#{login.error}">Usuario o contraseña incorrectos.</span>
          </div>

          <div th:if="${param.disabled}"
               class="alert alert-warning d-flex align-items-center gap-2 py-2 mb-3"
               role="alert">
            <i class="bi bi-slash-circle-fill"></i>
            <span th:text="#{login.disabled}">Tu cuenta ya no se encuentra activa.</span>
          </div>

          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" name="username" id="username"
                   placeholder="John Doe" autocomplete="username" />
          </div>

          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" placeholder="********"
                   name="password" id="password" autocomplete="current-password"/>
          </div>

          <button class="btn btn-login text-white" th:text="#{login.btn}">Login</button>

          <div class="footer-link">
            <div class="password-hint">
              <i class="bi bi-key-fill me-1"></i>
              <span th:text="#{login.hint.key}">Tu contraseña es tu</span>
              <strong th:text="#{login.hint.doc}">número de documento</strong>
              <span th:text="#{login.hint.identity}">de identidad.</span>
            </div>
            <p class="hint-contact" th:text="#{login.hint.contact}">¿No es así? Contacta a tu coordinador PreICFES:</p>
            <a href="https://wa.me/573107740572?text=Coordinador%20porfavor%20me%20puede%20restablecer%20la%20contrase%C3%B1a%3F"
               target="_blank"
               class="btn-whatsapp">
              <i class="bi bi-whatsapp"></i> <span th:text="#{login.coordinator}">Coordinador PreICFES</span>
            </a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
