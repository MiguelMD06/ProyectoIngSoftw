<!doctype html>

<html lang="es"  xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Panel PreICFES</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" type="text/css" href="../static/estilos/login.css" />
  </head>

  <body>
    <div class="login-card">
      <div class="login-header">
        <div class="logo">PPI</div>
        <small>Panel de Gestión de PreIcfes</small>
      </div>

      <div class="login-body">
        <h5>Iniciar sesión</h5>
        <p>Ingrese sus credenciales para acceder</p>

	<form th:action="@{/login}" method="post">
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username" id="username" placeholder="John Doe" />
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" placeholder="********" name="password" id="password"/>
        </div>

        <button class="btn btn-login text-white">
          Login <i class="bi bi-chevron-right"></i>
        </button>

        <div class="footer-link">
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
      </form>
      </div>
    </div>
  </body>
</html>
