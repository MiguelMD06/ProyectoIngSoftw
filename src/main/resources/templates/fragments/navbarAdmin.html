<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg nav-admin" th:fragment="navbar">
      <div class="container-fluid px-4">

        <!-- BRAND -->
        <a class="nav-admin-brand navbar-brand" th:href="@{/admin/pAdmin}">
          <div class="nav-admin-brand-icon">GE</div>
          <span class="nav-admin-brand-name">Gestión Escolar</span>
        </a>

        <!-- TOGGLER MOBILE -->
        <button class="nav-admin-toggler navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navAdminCollapse"
                aria-controls="navAdminCollapse" aria-expanded="false">
          <i class="bi bi-list text-white fs-4"></i>
        </button>

        <!-- LINKS + USUARIO -->
        <div class="collapse navbar-collapse" id="navAdminCollapse">

          <!-- LINKS -->
          <ul class="navbar-nav nav-admin-links me-auto ms-3">
            <li class="nav-item">
              <a class="nav-admin-link" th:href="@{/admin/AdminEstudiante}">
                <i class="bi bi-people"></i>Estudiantes
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-admin-link" th:href="@{/admin/AdminDocente}">
                <i class="bi bi-person-badge"></i>Docentes
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-admin-link" th:href="@{/admin/AdminAsistencia}">
                <i class="bi bi-calendar-check"></i>Asistencia
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-admin-link" th:href="@{/admin/AdminSimulacro}">
                <i class="bi bi-file-earmark-text"></i>Simulacros
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-admin-link" th:href="@{/admin/AdminMaterial}">
                <i class="bi bi-journal-bookmark"></i>Material
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-admin-link" th:href="@{/admin/AdminInstitucion}">
                <i class="bi bi-building"></i>Instituciones
              </a>
            </li>
          </ul>

          <!-- USUARIO + CONFIGURACIÓN + LOGOUT -->
          <div class="d-flex align-items-center gap-3 py-2 py-lg-0">
            <div class="nav-admin-user">
              <div class="nav-admin-avatar">
                <i class="bi bi-person-fill"></i>
              </div>
              <span class="nav-admin-username"
                    sec:authentication="principal.username"></span>
            </div>
            <a th:href="@{/admin/configuracion}" class="nav-admin-settings" title="Configuración">
              <i class="bi bi-gear-fill"></i>
            </a>
            <form th:action="@{/logout}" method="post" class="m-0">
              <button type="submit" class="nav-admin-logout">
                <i class="bi bi-box-arrow-right"></i>
                <span>Salir</span>
              </button>
            </form>
          </div>

        </div>
      </div>
    </nav>
  </body>
</html>
