<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso denegado - Panel PreICFES</title>
    <link rel="icon" th:href="@{/assets/gestion-icon.png}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" th:href="@{/estilos/error403.css}" />
  </head>

  <body>
    <div style="position:fixed;top:12px;right:16px;display:flex;gap:6px;z-index:999;">
      <a href="?lang=es" class="badge bg-secondary text-decoration-none" title="Español">ES</a>
      <a href="?lang=en" class="badge bg-secondary text-decoration-none" title="English">EN</a>
      <a href="?lang=fr" class="badge bg-secondary text-decoration-none" title="Français">FR</a>
      <a href="?lang=it" class="badge bg-secondary text-decoration-none" title="Italiano">IT</a>
    </div>

    <div class="error-card">
      <div class="error-header">
        <div class="logo">PPI</div>
        <small th:text="#{error.panel}">Panel de Gestión de PreIcfes</small>
      </div>

      <div class="error-body">
        <div class="error-icon">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <div class="error-code">403</div>
        <h5 th:text="#{error.403.title}">Acceso denegado</h5>
        <p th:text="#{error.403.msg}">No tienes permisos para acceder a esta sección.</p>
        <a th:href="@{/login}" class="btn-back">
          <i class="bi bi-arrow-left"></i> <span th:text="#{error.403.back}">Volver al inicio</span>
        </a>
      </div>
    </div>
  </body>
</html>
