<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso denegado - Panel PreICFES</title>
    <link rel="icon" th:href="@{/assets/gestion-icon.png}" type="image/png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/estilos/error403.css}" />
  </head>

  <body>
    <div class="error-card">
      <div class="error-header">
        <div class="logo">PPI</div>
        <small>Panel de Gestión de PreIcfes</small>
      </div>

      <div class="error-body">
        <div class="error-icon">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <div class="error-code">403</div>
        <h5>Acceso denegado</h5>
        <p>No tienes permisos para acceder a esta sección.<br/>Contacta a un administrador si crees que esto es un error.</p>
        <a th:href="@{/login}" class="btn-back">
          <i class="bi bi-arrow-left"></i> Volver al inicio
        </a>
      </div>
    </div>
  </body>
</html>
