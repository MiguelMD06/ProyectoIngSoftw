<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error interno - Panel PreICFES</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/estilos/error500.css}" />
  </head>

  <body>
    <div class="error-card">
      <div class="error-header">
        <div class="logo">PPI</div>
        <small>Panel de Gestión de PreIcfes</small>
      </div>

      <div class="error-body">
        <div class="error-icon">
          <i class="bi bi-exclamation-octagon-fill"></i>
        </div>
        <div class="error-code">500</div>
        <h5>Error interno del servidor</h5>
        <p>Ocurrió un problema inesperado al procesar tu solicitud.<br/>Por favor intenta de nuevo o contacta al administrador.</p>

        <div class="error-detail" th:if="${message != null and message != ''}">
          <strong>Detalle:</strong> <span th:text="${message}"></span>
        </div>

        <a th:href="@{/login}" class="btn-back">
          <i class="bi bi-arrow-left"></i> Volver al inicio
        </a>
      </div>
    </div>
  </body>
</html>
