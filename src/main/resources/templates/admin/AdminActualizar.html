<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Administrativo</title>
  <link rel="icon" th:href="@{/assets/gestion-icon.png}" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" th:href="@{/estilos/AdminRegistro.css}" />
  <link rel="stylesheet" href="../../static/estilos/AdminRegistro.css" />
</head>

<body>
  <div class="register-card">
    <!-- HEADER -->
    <div class="register-header">
      <div class="logo"></div>
      <div>
        <h5 class="m-0" th:text="#{register.brand}">Gestión Escolar</h5>
        <small th:text="#{update.admin.subtitle}">Actualizar Administrativo</small>
      </div>
    </div>

    <!-- BODY -->
    <div class="register-body">
      <h4 class="mb-4" th:text="#{update.title}">Actualizar Usuario</h4>

      <!-- ALERTAS -->
      <div th:if="${param.exito}">
        <div class="alert alert-success">
          <i class="bi bi-check-circle-fill"></i>
          <span th:text="#{update.success}">Usuario actualizado exitosamente</span>
        </div>
      </div>

      <div th:if="${param.error}">
        <div class="alert alert-danger">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span th:text="#{update.error}">Error al actualizar usuario</span>
        </div>
      </div>

      <!-- FORM -->
      <form id="formRegistroAdmin" th:action="@{/admin/modificar}" method="POST" th:object="${persona}">
        <div class="row">
          <!-- TIPO IDENTIFICACION -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.id.type}">Tipo de Identificación</label>
            <select id="tipoIdentificacion" name="tipoIdentificacion" class="form-select"
              th:field="*{tipoIdentificacion}" readonly>
              <option value="" th:text="#{form.select}">Seleccione...</option>
              <option th:each="ti : ${tiposIdentificaciones}" th:value="${ti.name()}" th:text="${ti.descripcion}">
              </option>
            </select>
            <div id="errorTipoId" class="error"></div>
          </div>

          <!-- NUMERO IDENTIFICACION -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.id.number}">Número de Identificación</label>
            <input type="text" id="numeroIdentificacion" name="numeroIdentificacion" class="form-control"
              th:placeholder="#{form.id.number.placeholder}" th:field="*{documentoIdentidad}" readonly />
            <div id="errorNumeroId" class="error"></div>
          </div>

          <!-- PRIMER NOMBRE -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.first.name}">Primer Nombre</label>
            <input type="text" id="primerNombre" name="primerNombre" class="form-control"
              th:placeholder="#{form.first.name.placeholder}" th:field="*{primerNombre}" />
            <div id="errorPrimerNombre" class="error"></div>
          </div>

          <!-- SEGUNDO NOMBRE -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.second.name}">Segundo Nombre</label>
            <input type="text" id="segundoNombre" name="segundoNombre" class="form-control"
              th:placeholder="#{form.second.name.placeholder}" th:field="*{segundoNombre}" />
          </div>

          <!-- PRIMER APELLIDO -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.first.last}">Primer Apellido</label>
            <input type="text" id="primerApellido" name="primerApellido" class="form-control"
              th:placeholder="#{form.first.last.placeholder}" th:field="*{primerApellido}" />
            <div id="errorPrimerApellido" class="error"></div>
          </div>

          <!-- SEGUNDO APELLIDO -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.second.last}">Segundo Apellido</label>
            <input type="text" id="segundoApellido" name="segundoApellido" class="form-control"
              th:placeholder="#{form.second.last.placeholder}" th:field="*{segundoApellido}" />
          </div>

          <!-- CELULAR -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.phone}">Celular</label>
            <input type="tel" id="celular" name="celular" class="form-control" placeholder="3001234567"
              th:field="*{celular}" />
            <div id="errorCelular" class="error"></div>
          </div>

          <!-- INSTITUCION -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.institution}">Institución</label>
            <select id="institucion" name="institucion" class="form-select" th:field="*{institucion}">
              <option value="" th:text="#{form.select}">Seleccione...</option>
              <option th:each="inst : ${instituciones}" th:value="${inst.id}" th:text="${inst.nombre}"></option>
            </select>
            <div id="errorInstitucion" class="error"></div>
          </div>

          <!-- SALON -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{form.classroom}">Salón</label>
            <input type="text" id="salon" name="salon" class="form-control"
              th:placeholder="#{form.classroom.placeholder}" th:field="*{salon}" />
            <div id="errorSalon" class="error"></div>
          </div>

          <input type="hidden" th:field="*{rol}">

          <!-- BOTON -->
          <button type="submit" class="btn btn-main text-white mt-3">
            <i class="bi bi-person-plus-fill"></i>
            <span th:text="#{update.btn}">Actualizar Usuario</span>
          </button>

          <a class="btn btn-outline-secondary mt-3" th:href="@{/admin/pAdmin}">
            <i class="bi bi-arrow-left-circle me-1"></i><span th:text="#{btn.back}">Volver</span>
          </a>
      </form>
    </div>
  </div>
</body>

</html>
