<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Asistencia</title>
    <link rel="icon" th:href="@{/assets/gestion-icon.png}" type="image/png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/estilos/AdminEstudiante.css}" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <div th:replace="~{fragments/navbarAdmin :: navbar}"></div>

    <div class="header container">
      <h2>Registro de Asistencia</h2>
      <h3 sec:authentication="principal.username"></h3>
      <p class="text-muted">
        Selecciona una fecha y un salón para registrar la asistencia.
      </p>
    </div>

    <!-- FILTROS -->
    <div class="title-section container">
      <form
        method="get"
        th:action="@{/admin/AdminAsistencia}"
        class="d-flex align-items-end gap-3 flex-wrap"
      >
        <div>
          <label for="fecha" class="form-label fw-semibold">Fecha</label>
          <input
            type="date"
            id="fecha"
            name="fecha"
            class="form-control"
            th:value="${fecha}"
            required
          />
        </div>
        <div>
          <label for="institucionId" class="form-label fw-semibold">Institución</label>
          <select id="institucionId" name="institucionId" class="form-select" required>
            <option value="" th:selected="${institucionId == null}">— Selecciona —</option>
            <option
              th:each="inst : ${instituciones}"
              th:value="${inst.id}"
              th:text="${inst.nombre}"
              th:selected="${inst.id == institucionId}"
            ></option>
          </select>
        </div>
        <div>
          <label for="salon" class="form-label fw-semibold">Salón</label>
          <select id="salon" name="salon" class="form-select" required>
            <option value="" th:selected="${salon == null or salon == ''}">— Selecciona —</option>
            <option value="1" th:selected="${salon == '1'}">Salón 1</option>
            <option value="2" th:selected="${salon == '2'}">Salón 2</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-search me-1"></i>Cargar estudiantes
        </button>
        <a th:href="@{/admin/pAdmin}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
      </form>
    </div>

    <!-- MENSAJE DE ÉXITO -->
    <div class="container mb-3" th:if="${exitoAsistencia}">
      <div class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${exitoAsistencia}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    </div>

    <!-- MENSAJE GUÍA -->
    <div class="container mt-4"
         th:if="${institucionId == null or salon == null or salon == ''}">
      <div class="table-card text-center py-5 text-muted">
        <i class="bi bi-funnel fs-1"></i>
        <p class="mt-3 mb-0">Selecciona una fecha, institución y salón para ver los estudiantes.</p>
      </div>
    </div>

    <!-- TABLA DE ESTUDIANTES -->
    <div class="container" th:if="${institucionId != null and salon != null and salon != ''}">
      <div class="table-card p-4">

        <!-- SIN ESTUDIANTES EN ESTE SALÓN -->
        <div
          th:if="${estudiantes == null or estudiantes.isEmpty()}"
          class="text-center py-5 text-muted"
        >
          <i class="bi bi-people display-4"></i>
          <p class="mt-3">No hay estudiantes en el
            <span th:text="'Salón ' + ${salon}"></span>
            de tu institución.
          </p>
        </div>

        <!-- FORMULARIO DE ASISTENCIA -->
        <div th:if="${estudiantes != null and !estudiantes.isEmpty()}">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="fw-semibold text-muted">
              <i class="bi bi-door-open me-1 text-success"></i>
              Salón <span th:text="${salon}"></span>
              &nbsp;·&nbsp;
              <span th:text="${estudiantes.size()}"></span> estudiantes
            </span>
          </div>
          <form th:action="@{/admin/registrarAsistencias}" method="post">
            <input type="hidden" name="fecha" th:value="${fecha}" />

            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Estudiante</th>
                  <th>Documento</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="est, iter : ${estudiantes}">
                  <td th:text="${iter.count}"></td>
                  <td th:text="${est.primerNombre + ' ' + est.primerApellido}"></td>
                  <td>
                    <span class="text-muted small" th:text="${est.documentoIdentidad}"></span>
                    <input type="hidden" name="documentos" th:value="${est.documentoIdentidad}" />
                  </td>
                  <td>
                    <select name="estados" class="form-select form-select-sm w-auto">
                      <option
                        th:each="e : ${estadosDisponibles}"
                        th:value="${e}"
                        th:text="${e.name() == 'PRESENTE' ? 'Presente' : (e.name() == 'AUSENTE' ? 'Ausente' : 'Tarde')}"
                        th:selected="${estadosPorDoc[est.documentoIdentidad] == e
                                       or (estadosPorDoc[est.documentoIdentidad] == null and e.name() == 'PRESENTE')}"
                      ></option>
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>

            <div class="d-flex justify-content-end mt-3">
              <button type="submit" class="btn btn-success px-4">
                <i class="bi bi-check2-all me-2"></i>Guardar asistencias
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </body>
</html>
