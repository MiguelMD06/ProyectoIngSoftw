<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Asistencia</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/estilos/AdminEstudiante.css}" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <div th:replace="~{fragments/navbarAdmin :: navbar}"></div>

    <div class="header container">
      <h2>Registro de Asistencia</h2>
      <h3 sec:authentication="principal.username"></h3>
      <p class="text-muted">
        Selecciona una fecha y registra el estado de cada estudiante.
      </p>
    </div>

    <!-- SELECTOR DE FECHA -->
    <div class="title-section container">
      <form
        method="get"
        th:action="@{/admin/AdminAsistencia}"
        class="d-flex align-items-end gap-3 flex-wrap"
      >
        <div>
          <label for="fecha" class="form-label fw-semibold">Fecha</label>
          <input
            type="date"
            id="fecha"
            name="fecha"
            class="form-control"
            th:value="${fecha}"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-search me-1"></i>Cargar estudiantes
        </button>
        <a th:href="@{/admin/pAdmin}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
      </form>
    </div>

    <!-- MENSAJE DE ÉXITO -->
    <div class="container mb-3" th:if="${exitoAsistencia}">
      <div class="alert alert-success">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${exitoAsistencia}"></span>
      </div>
    </div>

    <!-- TABLA DE ESTUDIANTES -->
    <div class="container">
      <div class="table-card p-4">
        <!-- SIN ESTUDIANTES -->
        <div
          th:if="${estudiantes == null or estudiantes.isEmpty()}"
          class="text-center py-5 text-muted"
        >
          <i class="bi bi-people display-4"></i>
          <p class="mt-3">No hay estudiantes asociados a tu institución.</p>
        </div>

        <!-- FORMULARIO DE ASISTENCIA -->
        <div th:if="${estudiantes != null and !estudiantes.isEmpty()}">
          <form th:action="@{/admin/registrarAsistencias}" method="post">
            <input type="hidden" name="fecha" th:value="${fecha}" />

            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Estudiante</th>
                  <th>Documento</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="est, iter : ${estudiantes}">
                  <td th:text="${iter.count}"></td>
                  <td
                    th:text="${est.primerNombre + ' ' + est.primerApellido}"
                  ></td>
                  <td>
                    <span
                      class="text-muted small"
                      th:text="${est.documentoIdentidad}"
                    ></span>
                    <input
                      type="hidden"
                      name="documentos"
                      th:value="${est.documentoIdentidad}"
                    />
                  </td>
                  <td>
                    <select
                      name="estados"
                      class="form-select form-select-sm w-auto"
                    >
                      <option
                        th:each="e : ${estadosDisponibles}"
                        th:value="${e}"
                        th:text="${e.name() == 'PRESENTE' ? 'Presente' : (e.name() == 'AUSENTE' ? 'Ausente' : 'Tarde')}"
                        th:selected="${estadosPorDoc[est.documentoIdentidad] == e
                                             or (estadosPorDoc[est.documentoIdentidad] == null and e.name() == 'PRESENTE')}"
                      ></option>
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>

            <div class="d-flex justify-content-end mt-3">
              <button type="submit" class="btn btn-success px-4">
                <i class="bi bi-check2-all me-2"></i>Guardar asistencias
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
