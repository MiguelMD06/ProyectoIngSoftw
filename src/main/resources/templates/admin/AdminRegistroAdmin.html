<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Coordinador</title>
  <link rel="icon" th:href="@{/assets/gestion-icon.png}" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" th:href="@{/estilos/AdminRegistro.css}" />
</head>

<body>
  <div class="register-card">
    <!-- HEADER -->
    <div class="register-header">
      <div class="nav-admin-brand-icon">GE</div>
      <div>
        <h5 class="m-0" th:text="#{register.brand}">Gestión Escolar</h5>
        <small th:text="#{register.header.subtitle}">Registro Administrativo</small>
      </div>
    </div>

    <!-- BODY -->
    <div class="register-body">
      <h4 class="mb-4" th:text="#{register.coordinator.title}">Registro de Coordinadores</h4>

      <div th:if="${param.exito}">
        <div class="alert alert-success">
          <i class="bi bi-check-circle-fill"></i>
          <span th:text="#{register.coordinator.success}">Coordinador registrado exitosamente</span>
        </div>
      </div>
      <div th:if="${param.error}">
        <div class="alert alert-danger">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span th:text="#{register.coordinator.error}">Nombre de usuario inválido o ya en uso</span>
        </div>
      </div>

      <form th:action="@{/registroAdmin}" method="post" th:object="${usuario}">
        <div class="row">
          <!-- NOMBRE DE USUARIO -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{register.admin.username}">Nombre de Usuario</label>
            <input type="text" class="form-control" th:field="*{username}" required autofocus />
          </div>

          <!-- CONTRASEÑA -->
          <div class="col-md-6 mb-3">
            <label class="form-label" th:text="#{register.admin.password}">Contraseña</label>
            <input type="password" class="form-control" th:field="*{password}" required />
          </div>

          <!-- INSTITUCIÓN -->
          <div class="col-md-12 mb-3">
            <label class="form-label" th:text="#{form.institution}">Institución</label>
            <select class="form-select" th:field="*{institucionId}">
              <option value="" th:text="#{form.select}">Seleccione...</option>
              <option th:each="inst : ${instituciones}"
                      th:value="${inst.id}"
                      th:text="${inst.nombre}">
              </option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-main text-white mt-3">
          <i class="bi bi-person-plus-fill me-1"></i>
          <span th:text="#{register.coordinator.btn}">Registrar Coordinador</span>
        </button>

        <a class="btn btn-outline-secondary mt-3" th:href="@{/admin/configuracion}">
          <i class="bi bi-arrow-left-circle me-1"></i><span th:text="#{btn.back}">Volver</span>
        </a>
      </form>
    </div>
  </div>
</body>

</html>
