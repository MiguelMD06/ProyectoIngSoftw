<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Estudiantes</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/estilos/AdminEstudiante.css}" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <!-- NAVBAR -->
    <div th:replace="~{fragments/navbarAdmin :: navbar}"></div>

    <!-- HEADER -->
    <div class="header container">
      <h2>Bienvenido Administrador,</h2>
      <h3 sec:authentication="principal.username"></h3>
      <p class="text-muted">
        Realiza los cambios necesarios a todos los estudiantes activos de los
        cursos PreIcfes.
      </p>
    </div>

    <!-- TITLE -->
    <div class="title-section container">
      <h2>Panel de Estudiantes</h2>
      <a
        class="btn btn-create text-white mt-3 bi bi-plus"
        th:href="@{/registro}"
      >
        Crear Estudiante
      </a>
    </div>

    <!-- FILTROS DINÁMICOS -->
    <div class="container mb-4">
      <!-- SELECT INSTITUCION -->
      <div class="mb-3">
        <label for="institucionSelect" class="form-label">Institución</label>
        <select
          id="institucionSelect"
          class="form-select"
          th:if="${instituciones != null and !instituciones.isEmpty()}"
        >
          <option
            th:each="inst : ${instituciones}"
            th:value="${inst.id}"
            th:text="${inst.nombre}"
          ></option>
        </select>

        <!-- MENSAJE SI NO HAY INSTITUCIONES -->
        <div
          th:if="${instituciones == null or instituciones.isEmpty()}"
          class="alert alert-info mt-3"
        >
          No hay instituciones registradas.
          <button
            class="btn btn-create ms-2"
            data-bs-toggle="modal"
            data-bs-target="#modalInstitucion"
          >
            Registrar Institución
          </button>
        </div>
      </div>

      <!-- SELECT SALON -->
      <div class="mb-3">
        <label for="salonSelect" class="form-label">Salón</label>
        <select id="salonSelect" class="form-select">
          <option value="1">Salón 1</option>
          <option value="2">Salón 2</option>
        </select>
      </div>

      <!-- BOTÓN PARA REGISTRAR INSTITUCIÓN -->
      <button
        class="btn btn-create"
        data-bs-toggle="modal"
        data-bs-target="#modalInstitucion"
      >
        Registrar Institución
      </button>
    </div>

<!-- ALERTA DE ÉXITO -->
<div th:if="${exitoInstitucion}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
  <i class="bi bi-check-circle-fill"></i>
  <span th:text="${exitoInstitucion}"></span>
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- ALERTA DE ERROR -->
<div th:if="${errorInstitucion}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
  <i class="bi bi-exclamation-triangle-fill"></i>
  <span th:text="${errorInstitucion}"></span>
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

    <!-- TABLA ESTUDIANTES -->
    <div class="container mb-5">
      <div class="table-card">
        <div
          class="table-responsive"
          th:if="${estudiantes != null and !estudiantes.isEmpty()}"
        >
          <table class="table align-middle">
            <thead>
              <tr>
                <th>#</th>
                <th>Activo</th>
                <th>Institución</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="est, iterStat : ${estudiantes}">
                <td th:text="${iterStat.index + 1}"></td>
                <td th:text="${est.activo}"></td>
                <td th:text="${est.institucion.nombre}"></td>
                <td>
                  <button class="btn btn-edit text-white btn-sm">
                    <i class="bi bi-pencil"></i> Editar
                  </button>
                  <button class="btn btn-delete text-white btn-sm">
                    <i class="bi bi-trash"></i> Eliminar
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- MENSAJE SI NO HAY ESTUDIANTES -->
        <div
          th:if="${estudiantes == null or estudiantes.isEmpty()}"
          class="alert alert-info mt-3"
        >
          No hay estudiantes registrados.
          <a th:href="@{/registro}" class="btn btn-create ms-2"
            >Crear su primer Estudiante</a
          >
        </div>
      </div>
    </div>

    <!-- MODAL REGISTRAR INSTITUCIÓN -->
    <div class="modal fade" id="modalInstitucion" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Registrar Institución</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form
              th:action="@{/admin/crearInstitucion}"
              method="post"
              th:object="${institucion}"
            >
              <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input
                  type="text"
                  class="form-control"
                  th:field="*{nombre}"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Dirección</label>
                <input
                  type="text"
                  class="form-control"
                  th:field="*{direccion}"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Fecha Inicio</label>
                <input
                  type="date"
                  class="form-control"
                  th:field="*{fechaInicio}"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Fecha Final</label>
                <input
                  type="date"
                  class="form-control"
                  th:field="*{fechaFinal}"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Estado</label>
                <select class="form-select" th:field="*{estado}" required>
                  <option th:value="ACTIVO">Activo</option>
                  <option th:value="FINALIZADO">Finalizado</option>
                </select>
              </div>
              <button type="submit" class="btn btn-success">Guardar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
