<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Simulacro</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" th:href="@{/estilos/AdminRegistro.css}" />
  </head>

  <body>
    <div class="register-card">
      <!-- HEADER -->
      <div class="register-header">
        <div class="logo"></div>
        <div>
          <h5 class="m-0">Gestión Escolar</h5>
          <small>Registro Administrativo</small>
        </div>
      </div>

      <!-- BODY -->
      <div class="register-body">
        <h4 class="mb-4">Crear Simulacro</h4>

        <!-- Mensajes -->
        <div th:if="${exitoSimulacro}" class="alert alert-success">
          <span th:text="${exitoSimulacro}"></span>
        </div>

        <!-- FORM -->
        <!-- Formulario -->
        <form
          th:action="@{/admin/crearSimulacro}"
          method="post"
          th:object="${simulacro}"
        >
          <div class="mb-3">
            <label class="form-label">Título</label>
            <input
              type="text"
              class="form-control"
              th:field="*{titulo}"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea
              class="form-control"
              th:field="*{descripcion}"
              required
            ></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Fecha de Aplicación</label>
            <input
              type="date"
              class="form-control"
              th:field="*{fechaAplicacion}"
              required
            />
          </div>

          <button type="submit" class="btn btn-success">Guardar</button>

          <a
            class="btn btn-create text-black mt-3 bi bi-arrow-left-circle-fill"
            th:href="@{/admin/pAdmin}"
          >
            Volver
          </a>
        </form>
      </div>
    </div>

    <!-- <script src="../static/js/validacionesRegistro.js"></script> -->
  </body>
</html>
